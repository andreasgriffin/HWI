name: Sync Upstream

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
  repository_dispatch:
    types:
      - sync-upstream

permissions:
  contents: write

concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  merge-upstream-master:
    name: Merge bitcoin-core/HWI master
    runs-on: ubuntu-latest

    steps:
      - name: Check out master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream master
        run: |
          git remote add upstream https://github.com/bitcoin-core/HWI.git
          git fetch --no-tags upstream master
          git fetch --no-tags origin master

      - name: Merge upstream master when needed
        run: |
          if git merge-base --is-ancestor upstream/master HEAD; then
            echo "Fork already contains upstream/master"
            exit 0
          fi

          git merge --no-edit upstream/master

      - name: Push merged master
        run: git push origin HEAD:master
